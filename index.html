<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>启动应用程序</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4 sm:px-6 lg:px-8">
  <div id="app">
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mx-auto mb-4"></div>
        <p class="text-gray-600">加载中...</p>
      </div>
    </div>
  </div>

  <script>
    // Supabase 配置
    const SUPABASE_URL = 'https://fjlutoiuhozltposrqki.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqbHV0b2l1aG96bHRwb3NycWtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDM0NjAsImV4cCI6MjA5MTMxOTQ2MH0.NrvuwUnc8NrOUtkcIbr_jIUEjkO-dR0xl3HofhkjpqA';

    // 初始数据
    const INITIAL_DATA = [
      { 序号: 1, 是否启动: '否', 进程名称: 'WorkBuddy.exe', 程序路径: 'C:\\Users\\lenovo\\AppData\\Local\\Programs\\WorkBuddy\\WorkBuddy.exe' },
      { 序号: 2, 是否启动: '否', 进程名称: 'AweSun.exe', 程序路径: 'D:\\Program Files\\Oray\\AweSun\\AweSun.exe' },
    ];

    let currentData = [];
    let dbConnected = false;
    let isSaving = false;

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
      toast.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50 transition-opacity`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.style.opacity = '0', 3000);
      setTimeout(() => toast.remove(), 3500);
    }

    async function supabaseRequest(endpoint, options = {}) {
      const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
      const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...options.headers
      };

      const response = await fetch(url, {
        method: options.method || 'GET',
        headers,
        body: options.body ? JSON.stringify(options.body) : undefined
      });

      if (!response.ok) {
        const error = await response.text();
        throw new Error(error);
      }

      return await response.json();
    }

    async function fetchData() {
      try {
        const data = await supabaseRequest('processes?select=*&order=id.asc');
        
        if (data && data.length > 0) {
          currentData = data;
          dbConnected = true;
        } else {
          // 空表，插入初始数据
          for (const item of INITIAL_DATA) {
            await supabaseRequest('processes', {
              method: 'POST',
              body: item
            });
          }
          currentData = await supabaseRequest('processes?select=*&order=id.asc');
          dbConnected = true;
        }
      } catch (err) {
        console.error('数据库连接失败:', err);
        // 使用本地存储
        const stored = localStorage.getItem('process_data_v4');
        currentData = stored ? JSON.parse(stored) : [...INITIAL_DATA];
        showToast('数据库未连接，使用本地存储', 'error');
      }
      renderTable();
    }

    async function syncToSupabase() {
      if (isSaving) return;
      isSaving = true;

      try {
        // 获取服务器数据
        const serverData = await supabaseRequest('processes?select=*&order=id.asc');
        
        // 删除多余的数据
        for (const item of serverData) {
          if (!currentData.find(d => d.id === item.id)) {
            await supabaseRequest(`processes?id=eq.${item.id}`, { method: 'DELETE' });
          }
        }

        // 更新或插入数据
        for (const item of currentData) {
          if (item.id && item.id > 0) {
            // 检查是否在服务器存在
            const exists = serverData.find(d => d.id === item.id);
            if (exists) {
              // 更新
              await supabaseRequest(`processes?id=eq.${item.id}`, {
                method: 'PATCH',
                body: {
                  序号: item.序号,
                  是否启动: item.是否启动,
                  进程名称: item.进程名称,
                  程序路径: item.程序路径
                }
              });
            } else {
              // 插入
              await supabaseRequest('processes', {
                method: 'POST',
                body: {
                  序号: item.序号,
                  是否启动: item.是否启动,
                  进程名称: item.进程名称,
                  程序路径: item.程序路径
                }
              });
            }
          }
        }
        
        showToast('保存成功！', 'success');
      } catch (err) {
        console.error('保存失败:', err);
        localStorage.setItem('process_data_v4', JSON.stringify(currentData));
        showToast('保存失败: ' + err.message, 'error');
      }
      isSaving = false;
    }

    function addRecord(record) {
      const newId = currentData.length > 0 ? Math.max(...currentData.map(d => d.id || 0)) + 1 : 1;
      currentData.push({ ...record, id: newId });
      renderTable();
    }

    function deleteRecord(id) {
      currentData = currentData.filter(d => d.id !== id);
      renderTable();
    }

    function updateRecord(id, field, value) {
      const index = currentData.findIndex(d => d.id === id);
      if (index !== -1) {
        currentData[index][field] = value;
      }
    }

    let isEditMode = false;
    let deleteTargetId = null;

    function renderTable() {
      const app = document.getElementById('app');

      app.innerHTML = `
        <div class="max-w-7xl mx-auto">
          <div class="mb-8 flex items-center justify-between flex-wrap gap-4">
            <div>
              <h1 class="text-3xl font-bold text-gray-900">启动应用程序</h1>
              <p class="mt-1 text-gray-600">共 ${currentData.length} 个进程</p>
              <p class="mt-1 text-sm ${dbConnected ? 'text-green-600' : 'text-red-600'}">
                ${dbConnected ? '✓ 云端已连接' : '✗ 云端未连接（本地模式）'}
              </p>
            </div>
            <div class="flex gap-3 flex-wrap">
              <button onclick="syncToSupabase()" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition-colors">
                保存到云端
              </button>
              <button onclick="toggleEditMode()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors">
                ${isEditMode ? '完成编辑' : '编辑'}
              </button>
              <button onclick="confirmReset()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg font-medium transition-colors">
                重置
              </button>
            </div>
          </div>

          ${isEditMode ? `
          <div class="mb-6 p-6 bg-white rounded-xl shadow-lg border border-gray-200">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">新增进程</h3>
            <form id="addForm" onsubmit="handleAdd(event)" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">序号</label>
                <input type="number" name="序号" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">是否启动</label>
                <select name="是否启动" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                  <option value="是">是</option>
                  <option value="否" selected>否</option>
                  <option value="重启">重启</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">进程名称</label>
                <input type="text" name="进程名称" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">程序路径</label>
                <input type="text" name="程序路径" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
              </div>
              <div class="md:col-span-2 lg:col-span-4">
                <button type="submit" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition-colors">
                  添加
                </button>
              </div>
            </form>
          </div>
          ` : ''}

          <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
            <div class="overflow-x-auto">
              <table class="w-full">
                <thead>
                  <tr class="bg-gradient-to-r from-green-600 to-emerald-600">
                    <th class="px-6 py-4 text-left text-white font-semibold uppercase tracking-wider text-sm">序号</th>
                    <th class="px-6 py-4 text-left text-white font-semibold uppercase tracking-wider text-sm">是否启动</th>
                    <th class="px-6 py-4 text-left text-white font-semibold uppercase tracking-wider text-sm">进程名称</th>
                    <th class="px-6 py-4 text-left text-white font-semibold uppercase tracking-wider text-sm">程序路径</th>
                    ${isEditMode ? '<th class="px-6 py-4 text-left text-white font-semibold uppercase tracking-wider text-sm">操作</th>' : ''}
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                  ${currentData.map((item, index) => `
                    <tr class="hover:bg-gray-50 transition-colors duration-200 ${index % 2 === 0 ? 'bg-white' : 'bg-gray-50'}">
                      <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-gray-900">${item.序号}</td>
                      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                        ${isEditMode ? `
                          <select onchange="handleUpdate(${item.id}, '是否启动', this.value)" class="px-3 py-1 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                            <option value="是" ${item.是否启动 === '是' ? 'selected' : ''}>是</option>
                            <option value="否" ${item.是否启动 === '否' ? 'selected' : ''}>否</option>
                            <option value="重启" ${item.是否启动 === '重启' ? 'selected' : ''}>重启</option>
                          </select>
                        ` : item.是否启动}
                      </td>
                      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${item.进程名称}</td>
                      <td class="px-6 py-4 text-sm text-gray-600">${item.程序路径}</td>
                      ${isEditMode ? `
                        <td class="px-6 py-4 whitespace-nowrap">
                          <button onclick="confirmDelete(${item.id}, '${item.进程名称}')" class="px-3 py-1 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg text-sm font-medium transition-colors">
                            删除
                          </button>
                        </td>
                      ` : ''}
                    </tr>
                  `).join('')}
                  ${currentData.length === 0 ? `
                    <tr>
                      <td colspan="${isEditMode ? 5 : 4}" class="px-6 py-12 text-center text-gray-500">
                        暂无数据
                      </td>
                    </tr>
                  ` : ''}
                </tbody>
              </table>
            </div>
          </div>

          <div class="mt-6 p-4 ${dbConnected ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-200'} rounded-lg">
            <p class="text-sm ${dbConnected ? 'text-green-700' : 'text-yellow-700'}">
              ${dbConnected ? '✓ 数据已连接云端数据库' : '✗ 数据库未连接，数据仅保存在本地'}
            </p>
            <p class="text-sm ${dbConnected ? 'text-green-600' : 'text-yellow-600'} mt-1">
              ${dbConnected ? '点击「保存到云端」同步数据' : '请检查 Supabase 配置'}
            </p>
          </div>
        </div>

        <div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
          <div class="bg-white rounded-xl p-6 max-w-md mx-4 shadow-2xl">
            <h3 class="text-lg font-semibold text-gray-900 mb-2">确认删除</h3>
            <p class="text-gray-600 mb-6" id="deleteMessage">确定要删除这条记录吗？</p>
            <div class="flex justify-end gap-3">
              <button onclick="closeDeleteModal()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg font-medium">取消</button>
              <button onclick="executeDelete()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium">删除</button>
            </div>
          </div>
        </div>
      `;
    }

    function toggleEditMode() { isEditMode = !isEditMode; renderTable(); }

    function handleAdd(event) {
      event.preventDefault();
      const form = event.target;
      const formData = new FormData(form);
      addRecord({
        序号: parseInt(formData.get('序号')),
        是否启动: formData.get('是否启动'),
        进程名称: formData.get('进程名称'),
        程序路径: formData.get('程序路径'),
      });
      event.target.reset();
    }

    function handleUpdate(id, field, value) { updateRecord(id, field, value); }

    function confirmDelete(id, name) {
      deleteTargetId = id;
      const modal = document.getElementById('deleteModal');
      const message = document.getElementById('deleteMessage');
      if (modal && message) {
        message.textContent = `确定要删除进程 "${name}" 吗？`;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
      }
    }

    function closeDeleteModal() {
      deleteTargetId = null;
      const modal = document.getElementById('deleteModal');
      if (modal) { modal.classList.add('hidden'); modal.classList.remove('flex'); }
    }

    function executeDelete() {
      if (deleteTargetId !== null) {
        deleteRecord(deleteTargetId);
        deleteTargetId = null;
        closeDeleteModal();
      }
    }

    function confirmReset() {
      if (confirm('确定要重置所有数据吗？')) {
        currentData = [...INITIAL_DATA].map((item, index) => ({ ...item, id: index + 1 }));
        renderTable();
      }
    }

    window.syncToSupabase = syncToSupabase;
    window.handleUpdate = handleUpdate;

    fetchData();
  </script>
</body>
</html>
